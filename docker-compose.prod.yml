services:
  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    configs:
      - source: nginx_conf_v4
        target: /etc/nginx/conf.d/default.conf

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
      POSTGRES_DB: colibri_db
    secrets:
      - db-password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      update_config:
        order: start-first

  rabbitmq:
    image: rabbitmq:4-management-alpine
    configs:
      - source: rabbit_config
        target: /etc/rabbitmq/rabbitmq.conf
    environment:
      - RABBITMQ_DEFAULT_VHOST=colibri-vhost
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      update_config:
        order: start-first

  migrate:
    image: maximebourret/colibri-migrate:latest
    environment:
      DB_DRIVER: "postgres"
      DB_STRING_FILE: /run/secrets/db-string
    secrets:
      - db-string
    depends_on:
      - postgres

  consumer:
    image: maximebourret/colibri-consumer:latest
    environment:
      AMQP_URL_FILE: /run/secrets/rabbitmq-url
      DB_DRIVER: "postgres"
      DB_STRING_FILE: /run/secrets/db-string
      LOGO_S3_BUCKET_FILE: /run/secrets/logo-s3-bucket
      LOGO_S3_REGION_FILE: /run/secrets/logo-s3-region
      AWS_ACCESS_KEY_ID_FILE: /run/secrets/aws-access-key
      AWS_SECRET_ACCESS_KEY_FILE: /run/secrets/aws-secret-access-key
    secrets:
      - rabbitmq-url
      - db-string
      - google-api-key
      - aws-access-key
      - aws-secret-access-key
      - logo-s3-bucket
      - logo-s3-region
    depends_on:
      - rabbitmq
      - postgres
    restart: on-failure
    deploy:
      update_config:
        order: start-first
      replicas: 4

  api:
    image: maximebourret/colibri-api:latest
    environment:
      DB_DRIVER: "postgres"
      DB_STRING_FILE: /run/secrets/db-string
    secrets:
      - db-string
    depends_on:
      - postgres
    restart: on-failure
    deploy:
      update_config:
        order: start-first

  fetcher:
    image: maximebourret/colibri-fetcher:latest
    environment:
      AMQP_URL_FILE: /run/secrets/rabbitmq-url
    secrets:
      - rabbitmq-url
    depends_on:
      - consumer
      - rabbitmq
    deploy:
      restart_policy:
        condition: any
        delay: 4h

  certbot:
    image: certbot/certbot
    volumes:
      - certs:/etc/letsencrypt
      - certs-data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  docs:
    image: maximebourret/colibri-docs:latest
    ports:
      - "8181:80"
    restart: on-failure
    deploy:
      update_config:
        order: start-first

volumes:
  pgdata:
  certs:
  certs-data:

secrets:
  db-password:
    external: true
  db-string:
    external: true
  google-api-key:
    external: true
  rabbitmq-url:
    external: true
  aws-access-key:
    external: true
  aws-secret-access-key:
    external: true
  logo-s3-bucket:
    external: true
  logo-s3-region:
    external: true

configs:
  rabbit_config:
    external: true
    name: rabbitmq_v1
  nginx_conf_v4:
    file: ./nginx/conf.d/default.conf
